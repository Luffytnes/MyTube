services:
  wireproxy:
    build: ./wireproxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # wireproxy is fully userspace (Go + gVisor netstack, no TUN interface)
    # — NET_ADMIN is not required
    mem_limit: 64m
    cpus: "0.5"
    volumes:
      - mytube-data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    user: "mytube"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: "2.0"
    volumes:
      - mytube-data:/home/mytube/.mytube
    expose:
      - "8000"
    environment:
      - HOME=/home/mytube
      - WIREPROXY_HOST=wireproxy
    depends_on:
      - wireproxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "1.0"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get({host:'localhost',port:3000,path:'/'}, r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 64m
    ports:
      - "54321:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/auth/.htpasswd:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/_health 2>&1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  mytube-data:

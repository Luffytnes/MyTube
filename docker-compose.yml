services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - mytube-data:/root/.mytube  # persist VPN configs, podcast keys, etc.
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mytube-data:

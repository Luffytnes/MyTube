services:
  wireproxy:
    build: ./wireproxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN           # WireGuard requires kernel network capabilities
    mem_limit: 64m
    cpus: "0.5"
    volumes:
      - mytube-data:/data
    expose:
      - "25344"

  backend:
    build: ./backend
    restart: unless-stopped
    user: "mytube"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: "2.0"
    volumes:
      - mytube-data:/home/mytube/.mytube
    expose:
      - "8000"
    environment:
      - HOME=/home/mytube
      - WIREPROXY_HOST=wireproxy
    depends_on:
      - wireproxy

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "1.0"
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 64m
    ports:
      - "54321:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/auth/.htpasswd:ro
    depends_on:
      - backend
      - frontend

volumes:
  mytube-data:

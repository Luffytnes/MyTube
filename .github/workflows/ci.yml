name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — import + lint + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest ruff pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/ --select E,F,W --ignore E501,E701
        working-directory: .

      - name: Import check
        run: python -c "from main import app; print(f'OK — {len(app.routes)} routes')"
        working-directory: backend

      - name: Tests
        run: pytest tests/ -v
        working-directory: backend

  shellcheck:
    name: Shell — ShellCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck start.sh setup-auth.sh backup.sh restore.sh wireproxy/entrypoint.sh

  frontend:
    name: Frontend — install + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit npm dependencies
        # --audit-level=critical: Next.js 14 has known "high" vulns requiring
        # a breaking upgrade to v15+; tracked separately
        run: npm audit --audit-level=critical
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    name: Docker — validate + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build wireproxy image
        uses: docker/build-push-action@v6
        with:
          context: ./wireproxy
          push: false
          cache-from: type=gha,scope=wireproxy
          cache-to: type=gha,mode=max,scope=wireproxy

  smoke:
    name: Docker — smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test credentials
        run: |
          mkdir -p nginx
          HASH=$(openssl passwd -apr1 'testpass')
          printf 'testuser:%s\n' "$HASH" > nginx/.htpasswd

      - name: Build and start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -u testuser:testpass -o /dev/null -w '%{http_code}' \
              http://localhost:54321/api/health 2>/dev/null || echo "000")
            [ "$STATUS" = "200" ] && { echo "Backend healthy (attempt $i)"; exit 0; }
            echo "Attempt $i: status=$STATUS — waiting..."
            sleep 5
          done
          echo "Backend never became healthy after 200s"
          docker compose logs
          exit 1

      - name: Check that unauthenticated requests return 401
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' http://localhost:54321/)
          [ "$STATUS" = "401" ] || { echo "Expected 401, got $STATUS"; exit 1; }

      - name: Check backend health endpoint
        run: |
          RESP=$(curl -sf -u testuser:testpass http://localhost:54321/api/health)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'status={d[\"status\"]}'
          assert d['ffmpeg'] == 'ok', f'ffmpeg={d[\"ffmpeg\"]}'
          print('Health check passed')
          "

      - name: Check nginx internal health probe
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' http://localhost:54321/_health)
          [ "$STATUS" = "200" ] || { echo "Expected 200 on /_health, got $STATUS"; exit 1; }

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
